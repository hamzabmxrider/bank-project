name: bank-account-ci-cd

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '17'
  MAVEN_ARGS: '-B -ntp'
  MODULE: bank-core
  K8S_NAMESPACE: bank-account
  K8S_DEPLOYMENT: bank-core
  K8S_CONTAINER: bank-core
  POSTGRES_USER: bank_account
  POSTGRES_PASSWORD: bank_account
  POSTGRES_DB: bank_account
  DOCKER_POSTGRES_IP: jdbc:postgresql://localhost:5432/bank_account
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build-jars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build jars
        run: mvn $MAVEN_ARGS -pl "$MODULE" -am -DskipTests package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: bank-core-jar
          path: bank-core/target/*.jar

  unit-tests:
    runs-on: ubuntu-latest
    needs: build-jars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Unit tests
        run: mvn $MAVEN_ARGS -pl "$MODULE" -am -Dtest=CompteBancaireTest test

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15-bullseye
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{env.POSTGRES_USER}} -d ${{env.POSTGRES_DB}}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Integration tests
        run: mvn $MAVEN_ARGS -pl "$MODULE" -am verify

  cucumber-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    services:
      postgres:
        image: postgres:15-bullseye
        env:
          POSTGRES_DB: ${{env.POSTGRES_DB}}
          POSTGRES_USER: ${{env.POSTGRES_USER}}
          POSTGRES_PASSWORD: ${{env.POSTGRES_PASSWORD}}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{env.POSTGRES_USER}} -d ${{env.POSTGRES_DB}}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cucumber tests
        run: mvn $MAVEN_ARGS -pl "$MODULE" -am -Dtest=CompteBancaireCucumberTest test

  nexus-publish:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Publish to Nexus
        run: |
          if [ -z "${NEXUS_URL:-}" ] || [ -z "${NEXUS_USERNAME:-}" ] || [ -z "${NEXUS_PASSWORD:-}" ]; then
            echo "Nexus credentials are not configured. Skipping publication."
            exit 0
          fi
          NEXUS_REPO="${NEXUS_REPOSITORY:-maven-releases}"
          if [ "${GITHUB_REF_TYPE:-branch}" != "tag" ] && [ "${GITHUB_REF_NAME:-}" != "main" ]; then
            NEXUS_REPO="${NEXUS_REPOSITORY:-maven-snapshots}"
          fi
          mvn $MAVEN_ARGS -s ci/maven-settings.xml -pl "$MODULE" -am -DskipTests -DaltDeploymentRepository=nexus::default::${NEXUS_URL}/repository/${NEXUS_REPO} deploy
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_REPOSITORY: ${{ secrets.NEXUS_REPOSITORY }}

  docker-build:
    runs-on: ubuntu-latest
    needs: cucumber-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          REGISTRY="${DOCKER_REGISTRY:-ghcr.io}"
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-$GITHUB_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA::7}"
          docker build -t "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" -t "${REGISTRY}/${IMAGE_NAME}:latest" .
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push docker image
        run: |
          REGISTRY="${DOCKER_REGISTRY:-ghcr.io}"
          if [ "$REGISTRY" = "ghcr.io" ] && [ -z "${DOCKER_USERNAME:-}" ]; then
            docker login ghcr.io -u "${GITHUB_ACTOR}" -p "${GITHUB_TOKEN}"
          else
            if [ -z "${DOCKER_USERNAME:-}" ] || [ -z "${DOCKER_PASSWORD:-}" ]; then
              echo "Docker registry credentials are not configured. Skipping publication."
              exit 0
            fi
            docker login "$REGISTRY" -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
          fi
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-$GITHUB_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA::7}"
          docker build -t "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" -t "${REGISTRY}/${IMAGE_NAME}:latest" .
          docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker push "${REGISTRY}/${IMAGE_NAME}:latest"
        env:
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.5

      - name: Deploy to Kubernetes
        run: |
          if [ -z "${KUBE_CONFIG_B64:-}" ]; then
            echo "Kubernetes configuration is not set. Skipping deployment."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          printf '%s' "$KUBE_CONFIG_B64" | base64 -d > "${HOME}/.kube/config"
          REGISTRY="${DOCKER_REGISTRY:-ghcr.io}"
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-$GITHUB_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl -n "${K8S_NAMESPACE}" set image "deployment/${K8S_DEPLOYMENT}" "${K8S_CONTAINER}=${IMAGE_REF}"
          kubectl -n "${K8S_NAMESPACE}" rollout status "deployment/${K8S_DEPLOYMENT}"
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
