<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .info {
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px;
        }

        th {
            background-color: #f2f2f2;
        }

        .right {
            text-align: right;
        }

        .summary {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>Relevé de compte</h2>
</div>

<div class="info">
    <p><strong>Client :</strong> <span>Hamza MOUMINE</span></p>
    <p><strong>Compte :</strong> <span th:text="${numeroDeCompte}"></span></p>
    <p><strong>Type de compte :</strong> <span th:text="${typeCompteBancaire}"></span></p>
    <p><strong>Période :</strong> <span th:text="${dateDebut}"></span> - <span th:text="${dateFin}"></span></p>
</div>

<table>
    <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Débit</th>
        <th>Crédit</th>
        <th>Solde</th>
    </tr>

    <tr th:each="tx : ${events}">
        <td th:text="${tx.date}"></td>
        <td th:text="${tx.message}"></td>
        <td class="right" th:text="${tx.debit}"></td>
        <td class="right" th:text="${tx.credit}"></td>
        <td class="right" th:text="${tx.balance}"></td>
    </tr>
</table>

<div class="summary">
    <p>Solde final : <span th:text="${solde}"></span></p>
</div>

</body>
</html>
